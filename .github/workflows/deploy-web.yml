name: Deploy Web to Pages

on:
  push:
    branches: [main]
    paths:
      - "projects/web/**"
      - "projects/presentation/**"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch: {}

# Permissions required by the Pages deploy action.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; newer pushes supersede in-flight ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: projects/web/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      # Build the Markdown slide deck and serve it at /slides on the same Pages
      # site. HTML build needs no browser; notation assets are committed.
      - name: Build presentation (slides)
        working-directory: projects/presentation
        env:
          PUPPETEER_SKIP_DOWNLOAD: "true"
        run: |
          npm ci
          npm run build

      - name: Place slides under /slides
        run: cp -r ../presentation/dist ./dist/slides

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: projects/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
