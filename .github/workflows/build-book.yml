name: Build Jazz Scales Book

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
    branches: ["**"]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip

      - name: Cache Salamander Yamaha Piano soundfont
        uses: actions/cache@v4
        with:
          path: .cache/soundfonts
          key: salamander-sf2-v1

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y curl fluidsynth lilypond xz-utils

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Generate all keys (LY, PDF & MIDI)
        run: |
          python -m jazz_scales.generator \
            --output-dir build \
            --step 5 --count 12 --start C --prefer auto --anchor nearest --mode major \
            --pdf --midi --bpm 96

      - name: Fetch Salamander Yamaha Piano soundfont
        run: |
          bash src/jazz_scales/fetch_salamander_soundfont.sh

      - name: Render WAV audio from MIDI
        env:
          SALAMANDER_SF2: ${{ github.workspace }}/.cache/soundfonts/SalamanderGrandPiano-SF2-V3+20200602.sf2
        run: |
          bash src/jazz_scales/render_wavs.sh build build

      - name: Build cover and merged book
        env:
          MPLCONFIGDIR: ${{ github.workspace }}/.matplotlib
          MPLBACKEND: Agg
        run: |
          python -m jazz_scales.cover --output-dir build
          python -m jazz_scales.book --output-dir build

      - name: Create GitHub Release & upload assets
        if: ${{ github.ref_type == 'tag' }}
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/Jazz-Scales-Book.pdf
            build/jazz_scales_abjad_*.pdf
            build/jazz_scales_abjad_*.wav
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload CI artifacts (non-release runs)
        if: ${{ github.ref_type != 'tag' }}
        uses: actions/upload-artifact@v4
        with:
          name: jazz-scales-ci
          if-no-files-found: error
          path: |
            build/Jazz-Scales-Book.pdf
            build/jazz_scales_abjad_*.pdf
            build/jazz_scales_abjad_*.wav
