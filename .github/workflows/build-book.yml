name: Build Jazz Patterns

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
    branches: ["**"]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scales:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip

      - name: Cache Salamander Yamaha Piano soundfont
        uses: actions/cache@v4
        with:
          path: .cache/soundfonts
          key: salamander-sf2-v1

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y curl fluidsynth lilypond xz-utils

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install ./common ./projects/scales

      - name: Generate all keys (LY, PDF & MIDI)
        working-directory: projects/scales
        run: |
          python -m jazz_scales.generator \
            --output-dir build \
            --step 5 --count 12 --start C --prefer auto --anchor nearest --mode major \
            --pdf --midi --bpm 96

      - name: Fetch Salamander Yamaha Piano soundfont
        run: |
          bash projects/scales/src/jazz_scales/fetch_salamander_soundfont.sh

      - name: Render WAV audio from MIDI
        env:
          SALAMANDER_SF2: ${{ github.workspace }}/.cache/soundfonts/SalamanderGrandPiano-SF2-V3+20200602.sf2
        run: |
          bash projects/scales/src/jazz_scales/render_wavs.sh projects/scales/build projects/scales/build

      - name: Build cover and merged book
        working-directory: projects/scales
        env:
          MPLCONFIGDIR: ${{ github.workspace }}/.matplotlib
          MPLBACKEND: Agg
        run: |
          python -m jazz_scales.cover --output-dir build
          python -m jazz_scales.book --output-dir build

      - name: Create GitHub Release & upload scales assets
        if: ${{ github.ref_type == 'tag' }}
        uses: softprops/action-gh-release@v2
        with:
          files: |
            projects/scales/build/Jazz-Scales-Book.pdf
            projects/scales/build/jazz_scales_abjad_*.pdf
            projects/scales/build/jazz_scales_abjad_*.wav
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload CI artifacts (non-release runs)
        if: ${{ github.ref_type != 'tag' }}
        uses: actions/upload-artifact@v4
        with:
          name: jazz-scales-ci
          if-no-files-found: error
          path: |
            projects/scales/build/Jazz-Scales-Book.pdf
            projects/scales/build/jazz_scales_abjad_*.pdf
            projects/scales/build/jazz_scales_abjad_*.wav

  blues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y lilypond

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install ./common ./projects/blues

      - name: Generate blues studies (LY, PDF & MIDI)
        working-directory: projects/blues
        run: |
          python -m jazz_blues.blues_take_1 \
            --keys Bb F C \
            --output-dir build \
            --pdf --midi --bpm 112

      # Blues builds on every push/PR (and on tags, to verify it still builds) but
      # is intentionally NOT attached to GitHub Releases — it is uploaded only as a
      # CI artifact on non-tag runs.
      - name: Upload CI artifacts (non-release runs)
        if: ${{ github.ref_type != 'tag' }}
        uses: actions/upload-artifact@v4
        with:
          name: jazz-blues-ci
          if-no-files-found: error
          path: |
            projects/blues/build/blues_take_1_*.pdf

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: projects/web/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Upload built site (non-release runs)
        if: ${{ github.ref_type != 'tag' }}
        uses: actions/upload-artifact@v4
        with:
          name: jazz-web-ci
          if-no-files-found: error
          path: projects/web/dist

  # Decide whether this tag should get demo videos. Deploy ONLY for major (vX)
  # and minor "point" (vX.Y) tags — NOT patch tags (vX.Y.Z). i.e. one or two
  # numeric parts deploy; three parts (or any other shape) are skipped. GitHub's
  # job `if:` has no regex, so this tiny job computes the flag for `demo-video`.
  release-gate:
    if: ${{ github.ref_type == 'tag' }}
    runs-on: ubuntu-latest
    outputs:
      deploy: ${{ steps.gate.outputs.deploy }}
    steps:
      - id: gate
        env:
          REF: ${{ github.ref_name }}
        run: |
          if [[ "$REF" =~ ^v[0-9]+(\.[0-9]+)?$ ]]; then deploy=true; else deploy=false; fi
          echo "tag '$REF' -> deploy=$deploy"
          echo "deploy=$deploy" >> "$GITHUB_OUTPUT"

  # Render the demo videos and attach them to the GitHub Release for qualifying
  # tags only (see release-gate). Recording runs in real time, so this is
  # intentionally infrequent — tag-gated, never on plain pushes/PRs.
  demo-video:
    needs: release-gate
    if: ${{ needs.release-gate.outputs.deploy == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            projects/web/package-lock.json
            projects/web/tools/demo/package-lock.json

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Build the web app
        working-directory: projects/web
        run: |
          npm ci
          npm run build

      - name: Cache Puppeteer browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/puppeteer
          key: puppeteer-${{ runner.os }}-${{ hashFiles('projects/web/tools/demo/package-lock.json') }}

      - name: Install demo-tool deps (Puppeteer + Chromium)
        working-directory: projects/web/tools/demo
        run: |
          npm ci
          npx puppeteer browsers install chrome

      - name: Render both videos against a local preview of this tag
        run: |
          (cd projects/web && npm run preview -- --port 4173 --host 127.0.0.1 &)
          npx --yes wait-on -t 60000 http://127.0.0.1:4173
          cd projects/web/tools/demo
          DEMO_URL=http://127.0.0.1:4173/ DEMO_OUT_DIR="$RUNNER_TEMP" node make-demo.mjs
          # stable, descriptive asset names for the Releases page
          mv "$RUNNER_TEMP/demo-portrait.mp4"  "$RUNNER_TEMP/jazz-scales-demo-portrait.mp4"
          mv "$RUNNER_TEMP/demo-landscape.mp4" "$RUNNER_TEMP/jazz-scales-demo-landscape.mp4"
          ls -la "$RUNNER_TEMP"/jazz-scales-demo-*.mp4

      - name: Attach videos to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ runner.temp }}/jazz-scales-demo-portrait.mp4
            ${{ runner.temp }}/jazz-scales-demo-landscape.mp4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
