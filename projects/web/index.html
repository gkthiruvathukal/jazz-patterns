<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jazz Scales Practice ∀</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #ffffff;
        --fg: #111111;
        --notation-bg: #ffffff;
        --control-bg: #f5f5f5;
      }
      :root[data-theme="dark"] {
        color-scheme: dark;
        --bg: #1a1a1a;
        --fg: #e8e8e8;
        --notation-bg: #1a1a1a;
        --control-bg: #2a2a2a;
      }
      :root[data-theme="dark"] #notation svg { filter: invert(0.91); }
      body {
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        margin: 0; padding: 1.5rem;
        max-width: 920px; margin-inline: auto;
        background: var(--bg); color: var(--fg);
      }
      h1 { font-size: 1.4rem; margin: 0 0 1rem; display: flex; align-items: center; gap: 0.6rem; }
      .version-pill {
        font-size: 0.7rem; font-weight: 600; line-height: 1;
        padding: 0.25rem 0.55rem; border-radius: 999px;
        background: var(--control-bg); color: var(--fg);
        border: 1px solid color-mix(in srgb, var(--fg) 25%, transparent);
        text-decoration: none; letter-spacing: 0.02em; white-space: nowrap;
      }
      .version-pill:hover { border-color: color-mix(in srgb, var(--fg) 50%, transparent); }
      .controls {
        display: flex; flex-wrap: wrap; gap: 1rem 1.25rem;
        align-items: flex-end; margin-bottom: 1.25rem;
      }
      /* Swing/feel controls grouped onto their own row (forced full-width so it
         breaks below the dropdowns), wrapping together as one visual flow. */
      .swing-controls { flex-basis: 100%; display: flex; flex-wrap: wrap; gap: 1rem 1.25rem; align-items: flex-end; }
      .field { display: flex; flex-direction: column; gap: 0.25rem; }
      .field label { font-size: 0.8rem; opacity: 0.75; }
      select, input[type="number"] { box-sizing: border-box; height: 2.25rem; padding: 0.35rem 0.5rem; font-size: 1rem; background: var(--control-bg); color: var(--fg); border: 1px solid color-mix(in srgb, var(--fg) 30%, transparent); border-radius: 4px; }
      .checkbox { flex-direction: row; align-items: center; gap: 0.4rem; }
      input[type="range"] { width: 150px; accent-color: var(--fg); }
      input[type="range"]:disabled { opacity: 0.4; }
      .field:has(input:disabled) label { opacity: 0.5; }
      .buttons { display: flex; gap: 0.5rem; }
      button { padding: 0.45rem 1.1rem; font-size: 1rem; cursor: pointer; }
      #loop { border: 1px solid color-mix(in srgb, var(--fg) 40%, transparent); border-radius: 4px; background: var(--control-bg); color: var(--fg); }
      #loop.active { background: var(--fg); color: var(--bg); border-color: var(--fg); }
      #theme-toggle { padding: 0.3rem 0.7rem; font-size: 0.95rem; cursor: pointer; border: 1px solid color-mix(in srgb, var(--fg) 30%, transparent); border-radius: 4px; background: var(--control-bg); color: var(--fg); margin-left: auto; align-self: center; }
      #now-playing { font-size: 1.1rem; margin: 0.5rem 0; min-height: 1.4em; }
      #now-playing .chord { font-weight: 700; }
      #notation { position: relative; background: var(--notation-bg); border-radius: 6px; overflow-x: auto; -webkit-overflow-scrolling: touch; overscroll-behavior-x: contain; }
      .note-highlight { position: absolute; pointer-events: none; border-radius: 3px; background: rgba(255, 196, 0, 0.35); transition: left 60ms linear, width 60ms linear; }
      #status { font-size: 0.85rem; opacity: 0.7; min-height: 1.2em; margin-top: 0.5rem; }
      footer { margin-top: 2rem; padding-top: 1rem; border-top: 1px solid color-mix(in srgb, var(--fg) 20%, transparent); font-size: 0.8rem; opacity: 0.7; display: flex; align-items: center; gap: 0.6rem; flex-wrap: wrap; }
      footer a { color: inherit; text-decoration: none; display: inline-flex; align-items: center; gap: 0.3rem; }
      footer a:hover { opacity: 0.85; text-decoration: underline; }
      footer svg { width: 1.1em; height: 1.1em; fill: currentColor; vertical-align: middle; }
    </style>
  </head>
  <body>
    <h1>
      <span class="title">Jazz Scales Practice ∀</span>
      <a id="version-pill" class="version-pill"
         href="https://github.com/gkthiruvathukal/jazz-patterns/releases"
         target="_blank" rel="noopener"></a>
      <button id="theme-toggle" type="button" aria-label="Toggle dark/light mode">☀️</button>
    </h1>

    <div class="controls">
      <div class="field">
        <label for="key">Key</label>
        <select id="key"></select>
      </div>
      <div class="field">
        <label for="scale">Scale</label>
        <select id="scale"></select>
      </div>
      <div class="field">
        <label for="instrument">Sound</label>
        <select id="instrument"></select>
      </div>
      <div class="field">
        <label for="octave">Octave</label>
        <select id="octave"></select>
      </div>
      <div class="field">
        <label for="bpm">Tempo (BPM, quarter note)</label>
        <input id="bpm" type="number" min="40" max="240" step="1" value="96" />
      </div>
      <div class="field">
        <label for="prefer">Accidentals</label>
        <select id="prefer">
          <option value="auto">Auto (by key)</option>
          <option value="sharps">Sharps (♯)</option>
          <option value="flats">Flats (♭)</option>
        </select>
      </div>
      <div class="field checkbox">
        <input id="retrograde" type="checkbox" />
        <label for="retrograde">Retrograde (play backwards)</label>
      </div>
      <div class="swing-controls">
        <div class="field">
          <label for="feel">Feel</label>
          <select id="feel"></select>
        </div>
        <div class="field">
          <label for="accent">Off-beat accent (<span id="accent-val">20</span>)</label>
          <input id="accent" type="range" min="0" max="60" step="1" value="20" />
        </div>
        <div class="field">
          <label for="downbeat">Down-beat level (<span id="downbeat-val">100</span>)</label>
          <input id="downbeat" type="range" min="30" max="120" step="1" value="100" />
        </div>
      </div>
      <div class="buttons">
        <button id="play" type="button">Play</button>
        <button id="stop" type="button">Stop</button>
        <button id="loop" type="button" aria-pressed="false">Loop</button>
      </div>
    </div>

    <p id="now-playing"></p>
    <div id="notation"></div>
    <p id="status"></p>

    <footer>
      <span>Created by <a href="https://github.com/gkthiruvathukal" target="_blank" rel="noopener">George K. Thiruvathukal</a></span>
      <span>&middot;</span>
      <a href="https://github.com/gkthiruvathukal/jazz-patterns" target="_blank" rel="noopener">

        jazz-patterns
      </a>
      <span>&middot;</span>
      <a href="/slides/" target="_blank" rel="noopener">Slides (WIP)</a>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
